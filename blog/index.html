<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal — james.today</title>
<meta name="description" content="The Journal — essays on design, consciousness, and the spaces between, by James Bolden. Coming soon.">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
  /* ─── Tokens — shared with the homepage chassis ─── */
  :root {
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
    --s1: 0.5rem;
    --s2: 0.81rem;
    --s3: 1.31rem;
    --s4: 2.12rem;
    --s5: 3.43rem;
    --s6: 5.55rem;
    --s7: 8.98rem;
  }

  :root,
  [data-theme="dark"] {
    --bg: #0b0a0f;
    --bg-raised: #141319;
    --text: #e8e4dc;
    --text-bright: #f5f0e6;
    --text-dim: #a8a39b;
    --text-faint: #706b62;
    --accent: #c4956a;
    --accent-soft: rgba(196, 149, 106, 0.55);
    --accent-2: #3ea691;
    --accent-2-soft: rgba(62, 166, 145, 0.5);
    --line: rgba(196, 149, 106, 0.18);
    --line-soft: rgba(196, 149, 106, 0.08);
    --line-hover: rgba(196, 149, 106, 0.35);
    --grain-opacity: 0.025;
    --geo-opacity: 0.08;
  }

  [data-theme="light"] {
    --bg: #f4efe4;
    --bg-raised: #ede6d6;
    --text: #2a2925;
    --text-bright: #1c1b19;
    --text-dim: #5c574e;
    --text-faint: #8a8478;
    --accent: #a9763f;
    --accent-soft: rgba(169, 118, 63, 0.6);
    --accent-2: #2f8678;
    --accent-2-soft: rgba(47, 134, 120, 0.55);
    --line: rgba(169, 118, 63, 0.22);
    --line-soft: rgba(169, 118, 63, 0.12);
    --line-hover: rgba(169, 118, 63, 0.4);
    --grain-opacity: 0.018;
    --geo-opacity: 0.06;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { min-height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.6;
    letter-spacing: 0.01em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.4s ease, color 0.4s ease;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ─── Film grain ─── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: var(--grain-opacity);
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ─── Top bar ─── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: color-mix(in srgb, var(--bg) 72%, transparent);
    border-bottom: 1px solid var(--line-soft);
  }

  .topbar-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .topbar-home {
    font-family: var(--serif);
    font-size: 1.15rem;
    color: var(--text-bright);
    text-decoration: none;
  }

  .topbar-home em { font-style: italic; color: var(--accent); }

  .topbar-actions { display: flex; gap: 24px; align-items: center; }

  .topbar-actions a {
    font-family: var(--sans);
    font-size: 0.68rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.25s ease;
  }

  .topbar-actions a:hover { color: var(--accent); }

  .theme-toggle {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.25s ease;
  }

  .theme-toggle:hover { color: var(--accent-2); border-color: var(--accent-2-soft); }
  .theme-toggle svg { width: 15px; height: 15px; }
  .theme-toggle .moon { display: none; }
  [data-theme="light"] .theme-toggle .sun { display: none; }
  [data-theme="light"] .theme-toggle .moon { display: block; }

  /* ─── Stage ─── */
  .stage {
    flex: 1;
    position: relative;
    display: grid;
    place-items: center;
    padding: var(--s6) 40px var(--s7);
    overflow: hidden;
  }

  /* Breathing seed-of-life centerpiece */
  .seed {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 540px;
    height: 540px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: seedIn 2.6s ease 0.3s forwards, breathe 11s ease-in-out 2.6s infinite;
  }

  .seed svg { width: 100%; height: 100%; display: block; }

  .seed circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 0.4;
    opacity: var(--geo-opacity);
  }

  .seed .ring-2 { stroke: var(--accent-2); }

  @keyframes seedIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9) rotate(-22deg); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  }

  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    50% { transform: translate(-50%, -50%) scale(1.045) rotate(6deg); }
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 560px;
  }

  .eyebrow {
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--accent);
    margin-bottom: var(--s4);
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
  }

  .headline {
    font-family: var(--serif);
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 400;
    color: var(--text-bright);
    line-height: 1.12;
    letter-spacing: -0.015em;
    opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
  }

  .headline em { font-style: italic; color: var(--accent-2); }

  .rule {
    width: 56px;
    height: 1px;
    background: var(--line);
    margin: var(--s4) auto;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
  }

  .lede {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--text-dim);
    max-width: 44ch;
    margin: 0 auto var(--s5);
    opacity: 0;
    animation: fadeUp 1s ease 1s forwards;
  }

  .lede em { color: var(--text); font-style: italic; }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 18px 28px;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
  }

  .actions a {
    font-family: var(--sans);
    font-size: 0.72rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-decoration: none;
    padding: 4px 0;
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.25s ease, gap 0.25s ease;
  }

  .actions a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--accent-2);
    opacity: 0;
    transform: scaleX(0.4);
    transition: all 0.3s ease;
  }

  .actions a:hover { color: var(--text-bright); gap: 12px; }
  .actions a:hover::after { opacity: 0.7; transform: scaleX(1); }

  /* ─── Footer ─── */
  .footer {
    text-align: center;
    padding: var(--s4) 40px var(--s5);
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--text-faint);
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .seed { opacity: 1; }
  }

  @media (max-width: 760px) {
    .topbar-inner { padding: 14px 22px; }
    .topbar-actions { gap: 16px; }
    .stage { padding: var(--s5) 22px var(--s6); }
    .seed { width: 380px; height: 380px; }
  }
</style>
</head>
<body>

<!-- ─── Top bar ─── -->
<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="topbar-home">james<em>.today</em></a>
    <nav class="topbar-actions">
      <a href="/">Home</a>
      <a href="/cv/">CV</a>
      <a href="mailto:james@iris-cocreative.com">Contact</a>
      <button class="theme-toggle" type="button" aria-label="Toggle light / dark theme">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
        </svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
      </button>
    </nav>
  </div>
</header>

<main class="stage">

  <!-- Breathing seed-of-life -->
  <div class="seed" aria-hidden="true">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="30"/>
      <circle cx="100" cy="70" r="30"/>
      <circle cx="125.98" cy="85" r="30"/>
      <circle cx="125.98" cy="115" r="30"/>
      <circle cx="100" cy="130" r="30"/>
      <circle cx="74.02" cy="115" r="30"/>
      <circle cx="74.02" cy="85" r="30"/>
      <circle class="ring-2" cx="100" cy="100" r="60" stroke-width="0.3" opacity="0.05"/>
      <circle cx="100" cy="100" r="90" stroke-width="0.2" opacity="0.03"/>
    </svg>
  </div>

  <div class="content">
    <p class="eyebrow">The Journal</p>
    <h1 class="headline">Words are still <em>gathering</em>.</h1>
    <div class="rule"></div>
    <p class="lede">
      Essays on design, consciousness, and the spaces between — slow-written, and on their way. The first pieces will <em>take shape here</em> soon.
    </p>
    <div class="actions">
      <a href="/">Back to home <span aria-hidden="true">→</span></a>
      <a href="mailto:james@iris-cocreative.com?subject=Tell%20me%20when%20the%20journal%20opens">Tell me when it opens</a>
    </div>
  </div>

</main>

<footer class="footer">james.today · Journal</footer>

<script>
  (function () {
    var root = document.documentElement;
    var saved = null;
    try { saved = localStorage.getItem('jt-theme'); } catch (e) {}
    if (!saved) {
      saved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    root.setAttribute('data-theme', saved);

    var btn = document.querySelector('.theme-toggle');
    if (btn) {
      btn.addEventListener('click', function () {
        var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem('jt-theme', next); } catch (e) {}
      });
    }
  })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — james.today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0b0a0f;--bg-raised:#12111a;--bg-card:rgba(255,255,255,0.025);--bg-card-hover:rgba(255,255,255,0.045);--bg-input:rgba(255,255,255,0.03);--text:#e8e4dc;--text-dim:#706b62;--text-bright:#f5f0e6;--accent:#c4956a;--accent-hover:#d4a87d;--line:rgba(196,149,106,0.2);--line-subtle:rgba(196,149,106,0.08);--serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',sans-serif;--status-idea:#add8e6;--status-planning:#ffd700;--status-scheduled:#ffa500;--status-building:#32cd32;--status-done:#1e90ff;--status-integrated:#9370db;--error:#c46a6a;--success:#6ac47a;--radius:5px;--header-h:56px}
*{margin:0;padding:0;box-sizing:border-box}html{height:100%;background:var(--bg)}body{font-family:var(--sans);color:var(--text);min-height:100%;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:0.025;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:var(--header-h);background:var(--bg);border-bottom:1px solid var(--line-subtle)}
.header-brand{font-family:var(--serif);font-size:1.3rem;color:var(--text-bright);text-decoration:none;transition:color .3s}.header-brand em{font-style:italic;color:var(--accent)}.header-brand:hover{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:16px}.user-email{font-size:.7rem;color:var(--text-dim);font-weight:300}
.sign-out-btn{font-family:var(--sans);font-size:.65rem;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);background:none;border:1px solid var(--line);border-radius:var(--radius);padding:6px 12px;cursor:pointer;transition:all .3s}.sign-out-btn:hover{border-color:var(--accent);background:rgba(196,149,106,.08)}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--line-subtle);padding:0 24px;background:var(--bg)}
.tab-btn{font-family:var(--sans);font-size:.72rem;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;padding:14px 20px 12px;cursor:pointer;transition:all .25s}.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}.tab-panel.active{display:block}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;gap:12px;flex-wrap:wrap}.toolbar-left,.toolbar-right{display:flex;align-items:center;gap:10px}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.view-toggle button{font-family:var(--sans);font-size:.65rem;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;background:none;border:none;color:var(--text-dim);cursor:pointer;transition:all .25s}.view-toggle button.active{background:var(--accent);color:var(--bg)}.view-toggle button:hover:not(.active){color:var(--text)}
.legend{display:flex;gap:6px;flex-wrap:wrap}
.legend-chip{display:flex;align-items:center;gap:5px;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);padding:4px 10px;border-radius:20px;border:1px solid var(--line-subtle);cursor:pointer;transition:all .25s;user-select:none}
.legend-chip .pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}.legend-chip:hover{border-color:var(--line);color:var(--text)}.legend-chip.active{border-color:var(--accent);color:var(--text-bright);background:rgba(196,149,106,.06)}
.add-btn{font-family:var(--sans);font-size:.65rem;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);background:none;border:1px solid var(--accent);border-radius:var(--radius);padding:6px 14px;cursor:pointer;transition:all .25s}.add-btn:hover{background:var(--accent);color:var(--bg)}
.task-list-view{padding:0 24px 60px}.project-group{margin-bottom:32px}
.project-group-header{display:flex;align-items:center;gap:10px;padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--line-subtle);user-select:none}
.project-group-header .color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.project-group-header h3{font-family:var(--serif);font-size:1.05rem;font-weight:400;color:var(--text-bright)}
.project-group-header .count{font-size:.65rem;color:var(--text-dim);font-weight:300;letter-spacing:1px}
.task-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;margin-bottom:4px;background:var(--bg-card);border:1px solid var(--line-subtle);border-radius:var(--radius);cursor:pointer;transition:all .2s}
.task-card:hover{background:var(--bg-card-hover);border-color:var(--line);transform:translateX(2px)}
.task-pip{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}.task-card-body{flex:1;min-width:0}
.task-card-title{font-size:.82rem;font-weight:400;color:var(--text-bright);line-height:1.4}
.task-card-meta{display:flex;gap:10px;margin-top:4px;font-size:.65rem;color:var(--text-dim);font-weight:300}
.task-card-meta .due{color:var(--accent)}.task-card-meta .overdue{color:var(--error)}
.task-card.completed .task-card-title{text-decoration:line-through;opacity:.5}
.quick-add{display:flex;gap:8px;margin-top:8px}
.quick-add input{flex:1;padding:8px 12px;background:var(--bg-input);border:1px solid var(--line-subtle);border-radius:var(--radius);color:var(--text-bright);font-family:var(--sans);font-size:.8rem;font-weight:300;outline:none;transition:border-color .3s}
.quick-add input::placeholder{color:var(--text-dim);opacity:.5}.quick-add input:focus{border-color:var(--accent)}
.quick-add button{padding:8px 14px;background:none;border:1px solid var(--line);border-radius:var(--radius);color:var(--accent);font-family:var(--sans);font-size:.7rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .25s;white-space:nowrap}
.quick-add button:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.timeline-view{display:none}.timeline-view.active{display:block}
.timeline-nav{display:flex;align-items:center;gap:12px;padding:12px 24px}
.timeline-nav button{font-family:var(--sans);font-size:.65rem;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;background:none;border:1px solid var(--line);border-radius:var(--radius);color:var(--text-dim);cursor:pointer;transition:all .25s}
.timeline-nav button:hover{border-color:var(--accent);color:var(--accent)}
.timeline-nav .nav-label{font-family:var(--serif);font-size:.95rem;color:var(--text)}
.timeline-scroll{display:flex;gap:0;overflow-x:auto;padding:0 24px 40px;scroll-behavior:smooth}
.timeline-day{min-width:200px;max-width:200px;flex-shrink:0;border-right:1px solid var(--line-subtle);padding:0 12px}.timeline-day:last-child{border-right:none}
.timeline-day.today{background:rgba(196,149,106,.03)}.timeline-day.past .day-header{opacity:.4}
.day-header{padding:10px 0 8px;text-align:center;border-bottom:1px solid var(--line-subtle);margin-bottom:8px}
.day-header .day-name{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
.day-header .day-date{font-family:var(--serif);font-size:1.1rem;color:var(--text-bright);margin-top:2px}
.timeline-day.today .day-header .day-date{color:var(--accent)}
.timeline-card{padding:8px 10px;margin-bottom:6px;background:var(--bg-card);border:1px solid var(--line-subtle);border-radius:var(--radius);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.timeline-card:hover{background:var(--bg-card-hover)}
.timeline-card .tc-title{font-size:.75rem;font-weight:400;color:var(--text-bright);line-height:1.4}
.timeline-card .tc-project{font-size:.6rem;color:var(--text-dim);margin-top:3px}
.timer-display{text-align:center;padding:40px 24px 20px}
.timer-clock{font-family:var(--serif);font-size:clamp(3rem,8vw,4.5rem);color:var(--text-bright);letter-spacing:2px;font-variant-numeric:tabular-nums}
.timer-clock.running{color:var(--status-building)}
.timer-project{font-size:.75rem;color:var(--text-dim);margin-top:8px}
.timer-controls{display:flex;justify-content:center;gap:12px;margin-top:20px}
.timer-btn{font-family:var(--sans);font-size:.7rem;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:10px 24px;border-radius:var(--radius);cursor:pointer;transition:all .25s;border:1px solid}
.timer-btn.start{color:var(--status-building);border-color:var(--status-building);background:none}.timer-btn.start:hover{background:var(--status-building);color:var(--bg)}
.timer-btn.stop{color:var(--error);border-color:var(--error);background:none}.timer-btn.stop:hover{background:var(--error);color:var(--bg)}
.timer-btn.discard{color:var(--text-dim);border-color:var(--line);background:none}.timer-btn.discard:hover{border-color:var(--text-dim)}
.timer-meta{display:flex;gap:12px;justify-content:center;align-items:center;margin-top:16px;flex-wrap:wrap}
.timer-meta select,.timer-meta input{padding:8px 12px;background:var(--bg-input);border:1px solid var(--line-subtle);border-radius:var(--radius);color:var(--text-bright);font-family:var(--sans);font-size:.78rem;font-weight:300;outline:none;transition:border-color .3s}
.timer-meta select:focus,.timer-meta input:focus{border-color:var(--accent)}.timer-meta select option{background:var(--bg-raised)}
.timer-meta label.billable-toggle{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--text-dim);cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.timer-meta label.billable-toggle input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px}
.time-log{padding:0 24px 60px}
.time-log-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line-subtle);margin-bottom:12px}
.time-log-header h3{font-family:var(--serif);font-size:1.05rem;color:var(--text-bright)}.time-log-header .total{font-size:.75rem;color:var(--accent)}
.time-entry{display:grid;grid-template-columns:1fr 140px 80px 70px 50px;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line-subtle);font-size:.78rem}
.time-entry .te-desc{color:var(--text);font-weight:300}.time-entry .te-project{color:var(--text-dim);font-size:.7rem}
.time-entry .te-time{color:var(--text-dim);font-size:.7rem;font-weight:300}.time-entry .te-dur{color:var(--text-bright);font-weight:400;text-align:right}
.time-entry .te-billable{text-align:center}.te-billable .badge{padding:2px 6px;border-radius:10px;font-size:.55rem;letter-spacing:1px;text-transform:uppercase}
.te-billable .badge.yes{background:rgba(106,196,122,.12);color:var(--success)}.te-billable .badge.no{color:var(--text-dim)}
.time-entry .te-delete{text-align:center}.time-entry .te-delete button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.75rem;transition:color .2s;padding:4px}.time-entry .te-delete button:hover{color:var(--error)}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 24px 60px}
.project-card{background:var(--bg-card);border:1px solid var(--line-subtle);border-radius:var(--radius);padding:22px 20px;transition:all .25s;cursor:pointer;position:relative;overflow:hidden}
.project-card:hover{background:var(--bg-card-hover);border-color:var(--line);transform:translateY(-2px)}
.pc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pc-name{font-family:var(--serif);font-size:1.05rem;color:var(--text-bright)}
.pc-type{font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:2px 8px;border:1px solid var(--line-subtle);border-radius:10px;white-space:nowrap}
.pc-desc{font-size:.75rem;font-weight:300;color:var(--text-dim);line-height:1.5;margin-top:10px}
.pc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid var(--line-subtle)}
.pc-status{display:flex;align-items:center;gap:5px;font-size:.6rem;letter-spacing:1px;text-transform:uppercase}.pc-status .pip{width:6px;height:6px;border-radius:50%}
.pc-stats{font-size:.65rem;color:var(--text-dim)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-raised);border:1px solid var(--line);border-radius:8px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:28px;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal h2{font-family:var(--serif);font-size:1.3rem;color:var(--text-bright);margin-bottom:24px}
.modal-field{margin-bottom:18px}.modal-field label{display:block;font-size:.65rem;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:10px 12px;background:var(--bg-input);border:1px solid var(--line-subtle);border-radius:var(--radius);color:var(--text-bright);font-family:var(--sans);font-size:.82rem;font-weight:300;outline:none;transition:border-color .3s;resize:vertical}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--accent)}.modal-field select option{background:var(--bg-raised)}.modal-field textarea{min-height:80px}
.modal-row{display:flex;gap:12px}.modal-row .modal-field{flex:1}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:18px;border-top:1px solid var(--line-subtle)}
.modal-actions button{font-family:var(--sans);font-size:.7rem;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:10px 20px;border-radius:var(--radius);cursor:pointer;transition:all .25s}
.btn-cancel{background:none;border:1px solid var(--line);color:var(--text-dim)}.btn-cancel:hover{border-color:var(--text-dim);color:var(--text)}
.btn-save{background:var(--accent);border:1px solid var(--accent);color:var(--bg)}.btn-save:hover{background:var(--accent-hover)}
.btn-delete{background:none;border:1px solid var(--error);color:var(--error);margin-right:auto}.btn-delete:hover{background:var(--error);color:var(--bg)}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-dim);font-size:.85rem;font-weight:300}.empty-state .empty-icon{font-size:2rem;margin-bottom:12px;opacity:.3}
.loading-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:600;transition:opacity .5s}.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.3;animation:ldot 1.2s ease infinite}.loading-dot:nth-child(2){animation-delay:.2s;margin:0 8px}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.8;transform:scale(1.2)}}
@media(max-width:700px){.time-entry{grid-template-columns:1fr 80px 50px}.time-entry .te-project,.time-entry .te-billable{display:none}}
@media(max-width:600px){.header{padding:0 16px}.tab-bar{padding:0 16px}.tab-btn{padding:12px 14px 10px;font-size:.65rem}.toolbar{padding:12px 16px}.task-list-view,.time-log,.projects-grid{padding-left:16px;padding-right:16px}.user-email{display:none}.modal{padding:20px}.timeline-day{min-width:160px;max-width:160px}}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
<header class="header">
  <a href="/" class="header-brand">james<em>.today</em></a>
  <div class="header-right"><span class="user-email" id="userEmail"></span><button class="sign-out-btn" onclick="signOut()">Sign out</button></div>
</header>
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="tasks">Tasks</button>
  <button class="tab-btn" data-tab="time">Time</button>
  <button class="tab-btn" data-tab="projects">Projects</button>
</nav>
<div class="tab-panel active" id="panel-tasks">
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="view-toggle" id="taskViewToggle"><button class="active" data-view="list">List</button><button data-view="timeline">Timeline</button></div>
      <div class="legend" id="statusLegend"></div>
    </div>
    <div class="toolbar-right"><button class="add-btn" onclick="openTaskModal()">+ Task</button></div>
  </div>
  <div class="task-list-view" id="taskListView"></div>
  <div class="timeline-view" id="taskTimelineView">
    <div class="timeline-nav">
      <button onclick="timelineNav(-7)">&#8592; Prev</button><button onclick="timelineToday()">Today</button><button onclick="timelineNav(7)">Next &#8594;</button>
      <span class="nav-label" id="timelineLabel"></span>
    </div>
    <div class="timeline-scroll" id="timelineScroll"></div>
  </div>
</div>
<div class="tab-panel" id="panel-time">
  <div class="timer-display">
    <div class="timer-clock" id="timerClock">00:00:00</div>
    <div class="timer-project" id="timerProjectLabel">No project selected</div>
    <div class="timer-controls" id="timerControls"><button class="timer-btn start" onclick="startTimer()">Start</button></div>
    <div class="timer-meta">
      <select id="timerProject"><option value="">&#8212; Project &#8212;</option></select>
      <input type="text" id="timerDesc" placeholder="What are you working on?">
      <label class="billable-toggle"><input type="checkbox" id="timerBillable"> Billable</label>
    </div>
  </div>
  <div class="time-log"><div class="time-log-header"><h3>Recent Sessions</h3><span class="total" id="timeTotalToday"></span></div><div id="timeEntries"></div></div>
</div>
<div class="tab-panel" id="panel-projects">
  <div class="toolbar"><div class="toolbar-left"></div><div class="toolbar-right"><button class="add-btn" onclick="openProjectModal()">+ Project</button></div></div>
  <div class="projects-grid" id="projectsGrid"></div>
</div>
<div class="modal-overlay" id="taskModal"><div class="modal">
  <h2 id="taskModalTitle">New Task</h2>
  <div class="modal-field"><label>Title</label><input type="text" id="tf-title" placeholder="What needs to be done?"></div>
  <div class="modal-field"><label>Description</label><textarea id="tf-desc" placeholder="Details, context, notes..."></textarea></div>
  <div class="modal-row">
    <div class="modal-field"><label>Status</label><select id="tf-status"><option value="idea">Idea</option><option value="planning">Planning</option><option value="scheduled">Scheduled</option><option value="building">Building</option><option value="done">Done</option><option value="integrated">Integrated</option></select></div>
    <div class="modal-field"><label>Priority</label><select id="tf-priority"><option value="1">1 &#8212; Highest</option><option value="2">2 &#8212; High</option><option value="3" selected>3 &#8212; Normal</option><option value="4">4 &#8212; Low</option><option value="5">5 &#8212; Lowest</option></select></div>
  </div>
  <div class="modal-row">
    <div class="modal-field"><label>Project</label><select id="tf-project"><option value="">&#8212; None &#8212;</option></select></div>
    <div class="modal-field"><label>Due Date</label><input type="date" id="tf-due"></div>
  </div>
  <div class="modal-field"><label>Notes</label><textarea id="tf-notes" placeholder="Additional notes..."></textarea></div>
  <div class="modal-actions">
    <button class="btn-delete" id="taskDeleteBtn" onclick="deleteTask()" style="display:none">Delete</button>
    <button class="btn-cancel" onclick="closeTaskModal()">Cancel</button>
    <button class="btn-save" onclick="saveTask()">Save</button>
  </div>
</div></div>
<div class="modal-overlay" id="projectModal"><div class="modal">
  <h2 id="projectModalTitle">New Project</h2>
  <div class="modal-field"><label>Name</label><input type="text" id="pf-name" placeholder="Project name"></div>
  <div class="modal-field"><label>Description</label><textarea id="pf-desc" placeholder="What is this project about?"></textarea></div>
  <div class="modal-row">
    <div class="modal-field"><label>Type</label><select id="pf-type"><option value="client">Client</option><option value="personal">Personal</option><option value="house">House</option><option value="art">Art</option><option value="internal">Internal</option><option value="other">Other</option></select></div>
    <div class="modal-field"><label>Status</label><select id="pf-status"><option value="idea">Idea</option><option value="planning">Planning</option><option value="scheduled">Scheduled</option><option value="building" selected>Building</option><option value="done">Done</option><option value="integrated">Integrated</option><option value="paused">Paused</option><option value="archived">Archived</option></select></div>
  </div>
  <div class="modal-row">
    <div class="modal-field"><label>Start Date</label><input type="date" id="pf-start"></div>
    <div class="modal-field"><label>Target Date</label><input type="date" id="pf-target"></div>
  </div>
  <div class="modal-row">
    <div class="modal-field"><label>Budget</label><input type="number" id="pf-budget" step="0.01" placeholder="0.00"></div>
    <div class="modal-field"><label>Hourly Rate</label><input type="number" id="pf-rate" step="0.01" placeholder="0.00"></div>
  </div>
  <div class="modal-actions">
    <button class="btn-delete" id="projectDeleteBtn" onclick="deleteProject()" style="display:none">Delete</button>
    <button class="btn-cancel" onclick="closeProjectModal()">Cancel</button>
    <button class="btn-save" onclick="saveProject()">Save</button>
  </div>
</div></div>
<script>
const SUPABASE_URL = 'https://reoliysifzxuzpskywtm.supabase.co';
const SUPABASE_KEY='sb_publishable_trmR_URy0KyDtDUfpgjOfg_owXvNPRI';
const{createClient}=supabase;const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
const STATUSES=[{key:'idea',label:'Idea',color:'#add8e6'},{key:'planning',label:'Planning',color:'#ffd700'},{key:'scheduled',label:'Scheduled',color:'#ffa500'},{key:'building',label:'Building',color:'#32cd32'},{key:'done',label:'Done',color:'#1e90ff'},{key:'integrated',label:'Integrated',color:'#9370db'}];
const STATUS_MAP=Object.fromEntries(STATUSES.map(s=>[s.key,s]));
function statusColor(s){return STATUS_MAP[s]?.color||'#706b62'}
let tasks=[],projects=[],timeSessions=[];
let activeFilter=null,editingTaskId=null,editingProjectId=null;
let timelineStart=getMonday(new Date());
let timerInterval=null,timerStartedAt=null;

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='./login.html';return}
  document.getElementById('userEmail').textContent=session.user.email;
  await loadAll();document.getElementById('loadingScreen').classList.add('hidden');
})();
async function signOut(){await sb.auth.signOut();window.location.href='./login.html'}
sb.auth.onAuthStateChange((ev,s)=>{if(ev==='SIGNED_OUT'||!s)window.location.href='./login.html'});

async function loadAll(){await Promise.all([loadProjects(),loadTasks(),loadTimeSessions()]);renderAll()}
async function loadProjects(){const{data}=await sb.from('projects').select('*').eq('is_archived',false).order('name');projects=data||[]}
async function loadTasks(){const{data}=await sb.from('tasks').select('*').eq('is_archived',false).order('priority').order('created_at',{ascending:false});tasks=data||[]}
async function loadTimeSessions(){const{data}=await sb.from('time_sessions').select('*').order('started_at',{ascending:false}).limit(50);timeSessions=data||[]}
function renderAll(){renderStatusLegend();renderTaskList();renderTimeline();renderTimerProjectDropdown();renderTimeEntries();renderProjects()}

document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',()=>{
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');document.getElementById('panel-'+b.dataset.tab).classList.add('active');
})});
document.querySelectorAll('#taskViewToggle button').forEach(b=>{b.addEventListener('click',()=>{
  document.querySelectorAll('#taskViewToggle button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  const v=b.dataset.view;
  document.getElementById('taskListView').style.display=v==='list'?'block':'none';
  const tl=document.getElementById('taskTimelineView');tl.classList.toggle('active',v==='timeline');tl.style.display=v==='timeline'?'block':'none';
  if(v==='timeline')renderTimeline();
})});

function renderStatusLegend(){
  document.getElementById('statusLegend').innerHTML=STATUSES.map(s=>`<div class="legend-chip ${activeFilter===s.key?'active':''}" onclick="toggleFilter('${s.key}')"><span class="pip" style="background:${s.color}"></span>${s.label}</div>`).join('');
}
function toggleFilter(st){activeFilter=activeFilter===st?null:st;renderStatusLegend();renderTaskList();renderTimeline()}

function renderTaskList(){
  const c=document.getElementById('taskListView');
  const f=activeFilter?tasks.filter(t=>t.status===activeFilter):tasks;
  const g=new Map();g.set(null,{name:'No Project',color:'#706b62',tasks:[]});
  projects.forEach(p=>g.set(p.id,{name:p.name,color:p.color||'#c4956a',tasks:[]}));
  f.forEach(t=>{(g.get(t.project_id)||g.get(null)).tasks.push(t)});
  let h='';
  for(const[pid,gr]of g){
    if(!gr.tasks.length&&pid!==null)continue;
    const ac=gr.tasks.filter(t=>!['done','integrated'].includes(t.status)).length;
    h+=`<div class="project-group"><div class="project-group-header"><span class="color-dot" style="background:${gr.color}"></span><h3>${esc(gr.name)}</h3><span class="count">${ac} active &middot; ${gr.tasks.length} total</span></div>${gr.tasks.map(renderTaskCard).join('')}<div class="quick-add"><input type="text" placeholder="Quick add task..." onkeydown="quickAddTask(event,${pid?`'${pid}'`:'null'})"><button onclick="quickAddTaskBtn(this,${pid?`'${pid}'`:'null'})">Add</button></div></div>`;
  }
  if(!f.length&&!projects.length)h='<div class="empty-state"><div class="empty-icon">&#9671;</div>No tasks yet. Click + Task to get started.</div>';
  c.innerHTML=h;
}
function renderTaskCard(t){
  const today=new Date().toISOString().slice(0,10);
  const od=t.due_date&&t.due_date<today&&!['done','integrated'].includes(t.status);
  const p=projects.find(x=>x.id===t.project_id);const done=['done','integrated'].includes(t.status);
  return`<div class="task-card ${done?'completed':''}" onclick="openTaskModal('${t.id}')"><span class="task-pip" style="background:${statusColor(t.status)}"></span><div class="task-card-body"><div class="task-card-title">${esc(t.title)}</div><div class="task-card-meta">${t.due_date?`<span class="${od?'overdue':'due'}">${fmtDate(t.due_date)}</span>`:''}${p?`<span>${esc(p.name)}</span>`:''}${t.priority<=2?`<span style="color:var(--accent)">P${t.priority}</span>`:''}</div></div></div>`;
}
async function quickAddTask(e,pid){if(e.key!=='Enter'||!e.target.value.trim())return;const t=e.target.value.trim();e.target.value='';const ins={title:t,status:'idea',priority:3};if(pid)ins.project_id=pid;await sb.from('tasks').insert(ins);await loadTasks();renderTaskList();renderTimeline()}
async function quickAddTaskBtn(btn,pid){const inp=btn.previousElementSibling;if(!inp.value.trim()){inp.focus();return}const t=inp.value.trim();inp.value='';const ins={title:t,status:'idea',priority:3};if(pid)ins.project_id=pid;await sb.from('tasks').insert(ins);await loadTasks();renderTaskList();renderTimeline()}

function renderTimeline(){
  const c=document.getElementById('timelineScroll');const today=new Date().toISOString().slice(0,10);
  const days=[];for(let i=0;i<14;i++){const d=new Date(timelineStart);d.setDate(d.getDate()+i);days.push(d)}
  document.getElementById('timelineLabel').textContent=`${fmtDateShort(days[0])} \u2014 ${fmtDateShort(days[13])}`;
  const f=activeFilter?tasks.filter(t=>t.status===activeFilter):tasks;
  c.innerHTML=days.map(day=>{
    const ds=day.toISOString().slice(0,10);const dt=f.filter(t=>t.due_date===ds);
    const isT=ds===today,isP=ds<today;
    return`<div class="timeline-day ${isT?'today':''} ${isP?'past':''}"><div class="day-header"><div class="day-name">${day.toLocaleDateString('en-US',{weekday:'short'})}</div><div class="day-date">${day.toLocaleDateString('en-US',{month:'short'})} ${day.getDate()}</div></div>${dt.length?dt.map(t=>{const p=projects.find(x=>x.id===t.project_id);return`<div class="timeline-card" style="border-left-color:${statusColor(t.status)}" onclick="openTaskModal('${t.id}')"><div class="tc-title">${esc(t.title)}</div>${p?`<div class="tc-project">${esc(p.name)}</div>`:''}</div>`}).join(''):'<div style="padding:8px;font-size:.7rem;color:var(--text-dim);text-align:center;opacity:.4">&mdash;</div>'}</div>`;
  }).join('');
  const td=c.querySelector('.timeline-day.today');if(td)td.scrollIntoView({inline:'start',behavior:'smooth'});
}
function timelineNav(n){timelineStart.setDate(timelineStart.getDate()+n);renderTimeline()}
function timelineToday(){timelineStart=getMonday(new Date());renderTimeline()}

function openTaskModal(id){
  editingTaskId=id||null;const ps=document.getElementById('tf-project');
  ps.innerHTML='<option value="">\u2014 None \u2014</option>'+projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  if(id){const t=tasks.find(x=>x.id===id);if(!t)return;
    document.getElementById('taskModalTitle').textContent='Edit Task';document.getElementById('taskDeleteBtn').style.display='inline-block';
    document.getElementById('tf-title').value=t.title||'';document.getElementById('tf-desc').value=t.description||'';
    document.getElementById('tf-status').value=t.status||'idea';document.getElementById('tf-priority').value=t.priority||3;
    document.getElementById('tf-project').value=t.project_id||'';document.getElementById('tf-due').value=t.due_date||'';
    document.getElementById('tf-notes').value=t.notes||'';
  }else{document.getElementById('taskModalTitle').textContent='New Task';document.getElementById('taskDeleteBtn').style.display='none';
    ['tf-title','tf-desc','tf-notes'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('tf-status').value='idea';document.getElementById('tf-priority').value='3';
    document.getElementById('tf-project').value='';document.getElementById('tf-due').value='';
  }
  document.getElementById('taskModal').classList.add('open');document.getElementById('tf-title').focus();
}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('open');editingTaskId=null}
async function saveTask(){
  const title=document.getElementById('tf-title').value.trim();if(!title){document.getElementById('tf-title').focus();return}
  const p={title,description:document.getElementById('tf-desc').value.trim()||null,status:document.getElementById('tf-status').value,
    priority:parseInt(document.getElementById('tf-priority').value),project_id:document.getElementById('tf-project').value||null,
    due_date:document.getElementById('tf-due').value||null,notes:document.getElementById('tf-notes').value.trim()||null,
    completed_at:['done','integrated'].includes(document.getElementById('tf-status').value)?new Date().toISOString():null};
  if(editingTaskId)await sb.from('tasks').update(p).eq('id',editingTaskId);else await sb.from('tasks').insert(p);
  closeTaskModal();await loadTasks();renderTaskList();renderTimeline();
}
async function deleteTask(){if(!editingTaskId||!confirm('Delete this task?'))return;await sb.from('tasks').update({is_archived:true}).eq('id',editingTaskId);closeTaskModal();await loadTasks();renderTaskList();renderTimeline()}
document.getElementById('taskModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeTaskModal()});

function renderTimerProjectDropdown(){
  const s=document.getElementById('timerProject');
  s.innerHTML='<option value="">\u2014 Project \u2014</option>'+projects.filter(p=>!['done','integrated','archived'].includes(p.status)).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
}
function startTimer(){
  timerStartedAt=new Date();timerInterval=setInterval(updateTimerDisplay,1000);
  document.getElementById('timerClock').classList.add('running');
  const proj=projects.find(p=>p.id===document.getElementById('timerProject').value);
  document.getElementById('timerProjectLabel').textContent=proj?proj.name:'No project selected';
  document.getElementById('timerControls').innerHTML='<button class="timer-btn stop" onclick="stopTimer()">Stop</button><button class="timer-btn discard" onclick="discardTimer()">Discard</button>';
}
function updateTimerDisplay(){if(!timerStartedAt)return;const d=Math.floor((Date.now()-timerStartedAt.getTime())/1000);document.getElementById('timerClock').textContent=`${String(Math.floor(d/3600)).padStart(2,'0')}:${String(Math.floor((d%3600)/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`}
async function stopTimer(){
  if(!timerStartedAt)return;clearInterval(timerInterval);
  const payload={started_at:timerStartedAt.toISOString(),ended_at:new Date().toISOString(),project_id:document.getElementById('timerProject').value||null,description:document.getElementById('timerDesc').value.trim()||null,is_billable:document.getElementById('timerBillable').checked};
  if(payload.project_id&&payload.is_billable){const proj=projects.find(p=>p.id===payload.project_id);if(proj?.hourly_rate)payload.hourly_rate=proj.hourly_rate}
  await sb.from('time_sessions').insert(payload);resetTimer();await loadTimeSessions();renderTimeEntries();
}
function discardTimer(){if(!confirm('Discard this session?'))return;clearInterval(timerInterval);resetTimer()}
function resetTimer(){timerStartedAt=null;timerInterval=null;document.getElementById('timerClock').textContent='00:00:00';document.getElementById('timerClock').classList.remove('running');document.getElementById('timerProjectLabel').textContent='No project selected';document.getElementById('timerDesc').value='';document.getElementById('timerControls').innerHTML='<button class="timer-btn start" onclick="startTimer()">Start</button>'}
function renderTimeEntries(){
  const c=document.getElementById('timeEntries');const today=new Date().toISOString().slice(0,10);
  if(!timeSessions.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">&#9673;</div>No time logged yet. Hit Start to begin.</div>';document.getElementById('timeTotalToday').textContent='';return}
  const tm=timeSessions.filter(s=>s.started_at?.slice(0,10)===today&&s.duration_min).reduce((a,s)=>a+parseFloat(s.duration_min),0);
  document.getElementById('timeTotalToday').textContent=`Today: ${fmtDur(tm)}`;
  c.innerHTML=timeSessions.map(s=>{const proj=projects.find(p=>p.id===s.project_id);const dur=s.duration_min?fmtDur(parseFloat(s.duration_min)):'running\u2026';const range=`${fmtTime(s.started_at)}${s.ended_at?' \u2192 '+fmtTime(s.ended_at):''}`;
    return`<div class="time-entry"><div><div class="te-desc">${esc(s.description||'Untitled session')}</div><div class="te-project">${proj?esc(proj.name):'\u2014'}</div></div><div class="te-time">${range}</div><div class="te-dur">${dur}</div><div class="te-billable">${s.is_billable?'<span class="badge yes">Billable</span>':'<span class="badge no">\u2014</span>'}</div><div class="te-delete"><button onclick="deleteTimeEntry(\'${s.id}\')" title="Delete">\u00d7</button></div></div>`;
  }).join('');
}
async function deleteTimeEntry(id){if(!confirm('Delete this time entry?'))return;await sb.from('time_sessions').delete().eq('id',id);await loadTimeSessions();renderTimeEntries()}

function renderProjects(){
  const c=document.getElementById('projectsGrid');
  if(!projects.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">&#9651;</div>No projects yet. Click + Project to create one.</div>';return}
  c.innerHTML=projects.map(p=>{const tc=tasks.filter(t=>t.project_id===p.id).length;const ac=tasks.filter(t=>t.project_id===p.id&&!['done','integrated'].includes(t.status)).length;const col=statusColor(p.status);
    return`<div class="project-card" onclick="openProjectModal('${p.id}')"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${col};opacity:.5"></div><div class="pc-header"><div class="pc-name">${esc(p.name)}</div><div class="pc-type">${p.type||'other'}</div></div>${p.description?`<div class="pc-desc">${esc(p.description)}</div>`:''}<div class="pc-footer"><div class="pc-status"><span class="pip" style="background:${col}"></span>${STATUS_MAP[p.status]?.label||p.status}</div><div class="pc-stats">${ac} active &middot; ${tc} tasks</div></div></div>`;
  }).join('');
}
function openProjectModal(id){
  editingProjectId=id||null;
  if(id){const p=projects.find(x=>x.id===id);if(!p)return;
    document.getElementById('projectModalTitle').textContent='Edit Project';document.getElementById('projectDeleteBtn').style.display='inline-block';
    document.getElementById('pf-name').value=p.name||'';document.getElementById('pf-desc').value=p.description||'';
    document.getElementById('pf-type').value=p.type||'personal';document.getElementById('pf-status').value=p.status||'idea';
    document.getElementById('pf-start').value=p.start_date||'';document.getElementById('pf-target').value=p.target_date||'';
    document.getElementById('pf-budget').value=p.budget||'';document.getElementById('pf-rate').value=p.hourly_rate||'';
  }else{document.getElementById('projectModalTitle').textContent='New Project';document.getElementById('projectDeleteBtn').style.display='none';
    ['pf-name','pf-desc'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('pf-type').value='personal';document.getElementById('pf-status').value='building';
    ['pf-start','pf-target','pf-budget','pf-rate'].forEach(x=>document.getElementById(x).value='');
  }
  document.getElementById('projectModal').classList.add('open');document.getElementById('pf-name').focus();
}
function closeProjectModal(){document.getElementById('projectModal').classList.remove('open');editingProjectId=null}
async function saveProject(){
  const name=document.getElementById('pf-name').value.trim();if(!name){document.getElementById('pf-name').focus();return}
  const p={name,description:document.getElementById('pf-desc').value.trim()||null,type:document.getElementById('pf-type').value,
    status:document.getElementById('pf-status').value,start_date:document.getElementById('pf-start').value||null,
    target_date:document.getElementById('pf-target').value||null,budget:parseFloat(document.getElementById('pf-budget').value)||null,
    hourly_rate:parseFloat(document.getElementById('pf-rate').value)||null,
    completed_at:['done','integrated'].includes(document.getElementById('pf-status').value)?new Date().toISOString():null};
  if(editingProjectId)await sb.from('projects').update(p).eq('id',editingProjectId);else await sb.from('projects').insert(p);
  closeProjectModal();await loadAll();
}
async function deleteProject(){if(!editingProjectId||!confirm('Archive this project? Tasks will remain.'))return;await sb.from('projects').update({is_archived:true}).eq('id',editingProjectId);closeProjectModal();await loadAll()}
document.getElementById('projectModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeProjectModal()});

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function getMonday(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()-day+(day===0?-6:1));dt.setHours(0,0,0,0);return dt}
function fmtDate(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtDateShort(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtTime(iso){return iso?new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):''}
function fmtDur(mins){const h=Math.floor(mins/60),m=Math.round(mins%60);return h>0?`${h}h ${m}m`:`${m}m`}
</script>
</body>
</html>

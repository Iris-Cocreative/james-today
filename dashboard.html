<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>james.today</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://use.typekit.net/zvp8mfo.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div id="loading" class="loading">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <div id="app" class="app" style="display:none;">
    <!-- Left column -->
    <aside id="left-col" class="left-col">
      <div class="left-col-resize" id="left-col-resize"></div>
      <!-- Day info (top) -->
      <div id="day-info" class="day-info"></div>

      <!-- Accordion: projects + tasks -->
      <div class="accordion">
        <div id="col-projects" class="acc-col acc-projects"></div>
        <div class="acc-divider"></div>
        <div id="col-tasks" class="acc-col acc-tasks"></div>
      </div>
    </aside>

    <!-- Main area -->
    <main id="main-area" class="main-area">
      <!-- World clock strip -->
      <div id="world-clock" class="world-clock"></div>

      <!-- Day timeline -->
      <div id="timeline" class="timeline"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/world-clock.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — james.today</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CSS (order matters) -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/studio.css">
  <link rel="stylesheet" href="css/rhythm.css">
  <link rel="stylesheet" href="css/time.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/ai-panel.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <noscript>JavaScript is required for james.today</noscript>

  <!-- Loading screen -->
  <div class="loading-screen" id="loading-screen" data-app="loading">
    <div class="loading-dots">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <a href="/" class="brand">james<em>.today</em></a>
    <div id="qualitative-time" class="qualitative-time" data-app="qtime"></div>
    <div class="header-actions">
      <span id="userEmail" class="user-email" data-app="user-email"></span>
      <button data-action="toggle-ai" class="btn-icon" aria-label="Toggle AI panel">AI</button>
      <button data-action="sign-out" class="btn-ghost">Sign out</button>
    </div>
  </header>

  <!-- Tab bar -->
  <nav class="tab-bar" role="tablist">
    <button class="tab active" data-tab="studio" role="tab" aria-selected="true" aria-controls="panel-studio">Studio</button>
    <button class="tab" data-tab="rhythm" role="tab" aria-selected="false" aria-controls="panel-rhythm">Rhythm</button>
    <button class="tab" data-tab="time" role="tab" aria-selected="false" aria-controls="panel-time">Time</button>
    <button class="tab" data-tab="map" role="tab" aria-selected="false" aria-controls="panel-map">Map</button>
  </nav>

  <!-- Tab panels -->
  <main class="tab-panels">
    <div class="tab-panel active" id="panel-studio" data-panel="studio" role="tabpanel"></div>
    <div class="tab-panel" id="panel-rhythm" data-panel="rhythm" role="tabpanel"></div>
    <div class="tab-panel" id="panel-time" data-panel="time" role="tabpanel"></div>
    <div class="tab-panel" id="panel-map" data-panel="map" role="tabpanel"></div>
  </main>

  <!-- Modal overlay -->
  <div id="modal-root"></div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Printable daily sheet -->
  <div id="print-sheet" class="print-sheet"></div>

  <!-- AI chat panel -->
  <aside id="ai-panel" class="ai-panel" data-app="ai-panel"></aside>

  <!-- Scripts (order matters — dependencies first) -->

  <!-- Core (no dependencies) -->
  <script src="js/utils.js"></script>
  <script src="js/qualitative-time.js"></script>

  <!-- Data layer (depends on utils) -->
  <script src="js/data.js"></script>

  <!-- UI systems (depends on data, utils) -->
  <script src="js/modals.js"></script>

  <!-- Views (depends on all above) -->
  <script src="js/studio.js"></script>
  <script src="js/rhythm.js"></script>
  <script src="js/time.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ai-panel.js"></script>

  <!-- App controller (depends on all above, initializes everything) -->
  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: #e0ddd8;
  }

  .panel {
    width: 400px;
    height: 600px;
    display: flex;
    overflow: hidden;
    border-radius: 12px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
  }

  .col-projects {
    flex: 3;
    min-width: 0;
    transition: flex 0.5s cubic-bezier(.22,1,.36,1);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .col-tasks {
    flex: 0.12;
    min-width: 0;
    transition: flex 0.5s cubic-bezier(.22,1,.36,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }
  .col-tasks.expanded { }

  .divider {
    width: 1px;
    background: #2a2a2a;
    flex-shrink: 0;
  }

  /* --- Project cards --- */
  .project-card {
    display: flex;
    align-items: flex-start;
    padding: 10px 12px;
    overflow: hidden;
    position: relative;
    min-height: 48px;
    height: var(--card-h, 48px);
    flex-shrink: 0;
    border: 2px solid var(--c);
    border-right-width: 1em;
    background: color-mix(in srgb, var(--c) 5%, transparent);
    transition: border-right-width 0.5s cubic-bezier(.22,1,.36,1),
                border-right-color 0.5s cubic-bezier(.22,1,.36,1),
                border-color 0.5s cubic-bezier(.22,1,.36,1),
                padding 0.3s cubic-bezier(.22,1,.36,1);
  }

  .project-card .card-name {
    font-size: 19.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #ccc;
    opacity: 1;
    transition: opacity 0.25s;
  }

  /* resize indicator line */
  .project-card::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 25%;
    width: 50%;
    height: 1px;
    background: var(--c);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .project-card.resize-hover::after { opacity: 1; }

  .col-projects.collapsed .project-card {
    padding: 0;
    border-width: 0;
    border-right-width: 1em;
    border-right-style: solid;
    border-right-color: color-mix(in srgb, var(--c) 50%, transparent);
  }
  .col-projects.collapsed .project-card .card-name { opacity: 0; }
  .col-projects.collapsed .project-card::after { opacity: 0; }
  .col-projects.collapsed { padding: 0; gap: 0; }

  /* --- Task groups --- */
  .task-group {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(.22,1,.36,1);
    flex: var(--group-flex, 1);
    min-height: 0;
    border-left: 1em solid var(--c);
  }

  .col-tasks.expanded .task-group {
    border: 2px solid var(--c);
    border-left-width: 1em;
  }

  .col-tasks:not(.expanded) .task-group {
    border-left-color: color-mix(in srgb, var(--c) 50%, transparent);
  }

  /* --- Task rows --- */
  .task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
    overflow: hidden;
    transition: padding 0.5s cubic-bezier(.22,1,.36,1),
                gap 0.5s cubic-bezier(.22,1,.36,1);
    flex: 1;
    min-height: 0;
    position: relative;
  }

  .task-row .task-label {
    font-size: 13px;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #999;
    opacity: 0;
    transition: opacity 0.3s 0.12s;
    flex: 1;
    min-width: 0;
  }

  .col-tasks.expanded .task-row { padding: 0 10px; }
  .col-tasks.expanded .task-row .task-label { opacity: 1; }
  .col-tasks.expanded .squircle-btn { opacity: 1; pointer-events: auto; }

  .col-tasks:not(.expanded) .task-row {
    padding: 0;
    gap: 0;
  }

  /* --- Squircle status icon --- */
  .squircle-btn {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s 0.12s, transform 0.15s;
    position: relative;
  }
  .squircle-btn:hover { transform: scale(1.2); }
  .squircle-btn svg { width: 16px; height: 16px; display: block; }

  /* --- Status dropdown --- */
  .status-dropdown {
    position: fixed;
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 4px;
    z-index: 100;
    display: none;
    min-width: 150px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .status-dropdown.show { display: block; }

  .status-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: #bbb;
    transition: background 0.12s;
  }
  .status-option:hover { background: #2e2e2e; }
  .status-option svg { width: 14px; height: 14px; flex-shrink: 0; }

  .col-projects::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="panel">
  <div class="col-projects" id="colProjects"></div>
  <div class="divider"></div>
  <div class="col-tasks" id="colTasks"></div>
</div>

<div class="status-dropdown" id="statusDropdown"></div>

<script>
const projects = [
  { name: 'Iris portal',       color: '#8B6FE8' },
  { name: 'Holomovement',      color: '#2DB88A' },
  { name: 'Light creators',    color: '#E0A030' },
  { name: 'Source of synergy', color: '#3B8FE0' },
  { name: 'Sensemaking today', color: '#D45A7A' },
];

const statuses = [
  { name: 'Integrated', color: '#9370db', solid: true },
  { name: 'Done',       color: '#1e90ff', solid: true },
  { name: 'Building',   color: '#32cd32', solid: true },
  { name: 'Scheduled',  color: '#ffa500', solid: false },
  { name: 'Planning',   color: '#ffd700', solid: false },
  { name: 'Idea',       color: '#add8e6', solid: false },
];

const tasks = [
  { p:0, t:'Rebuild auth flow',      s:2 },
  { p:0, t:'Migrate to Supabase',    s:3 },
  { p:0, t:'Dashboard cards',        s:5 },
  { p:1, t:'Member directory v3',    s:1 },
  { p:1, t:'Globe fix',              s:2 },
  { p:2, t:'Bilingual landing',      s:2 },
  { p:2, t:'Assessment quiz',        s:3 },
  { p:2, t:'n8n webhook',            s:4 },
  { p:2, t:'Discovery page',         s:5 },
  { p:3, t:'Mandala animation',      s:2 },
  { p:3, t:'Take action section',    s:4 },
  { p:4, t:'Domain setup',           s:1 },
  { p:4, t:'Design brief v2',        s:1 },
  { p:4, t:'Ethnography framework',  s:5 },
];

const SQUIRCLE_PATH = 'M10 0C13.5 0 16 0 17.5 1 19 2 20 4.5 20 10 20 15.5 19 18 17.5 19 16 20 13.5 20 10 20 6.5 20 4 20 2.5 19 1 18 0 15.5 0 10 0 4.5 1 2 2.5 1 4 0 6.5 0 10 0Z';

function squircleSVG(color, solid) {
  if (solid) {
    return `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="${SQUIRCLE_PATH}" fill="${color}"/>
    </svg>`;
  }
  return `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="${SQUIRCLE_PATH}" fill="none" stroke="${color}" stroke-width="2"/>
  </svg>`;
}

const colP = document.getElementById('colProjects');
const colT = document.getElementById('colTasks');
const dropdown = document.getElementById('statusDropdown');
const MIN_H = 48;
const RESIZE_ZONE = 10;
const heights = projects.map(() => MIN_H);
let activeDropdownTask = null;

// Group tasks by project
function getTaskGroups() {
  const groups = [];
  let current = null;
  tasks.forEach((t, i) => {
    if (!current || current.p !== t.p) {
      current = { p: t.p, tasks: [{ ...t, idx: i }] };
      groups.push(current);
    } else {
      current.tasks.push({ ...t, idx: i });
    }
  });
  return groups;
}

function renderProjects() {
  colP.innerHTML = '';
  projects.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.style.setProperty('--c', p.color);
    card.style.setProperty('--card-h', heights[i] + 'px');
    card.innerHTML = `<span class="card-name">${p.name}</span>`;

    // cursor + resize indicator on hover near bottom
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const nearBottom = (rect.bottom - e.clientY) <= RESIZE_ZONE;
      const aboveMin = heights[i] > MIN_H || nearBottom;
      if (nearBottom) {
        card.style.cursor = 'ns-resize';
        card.classList.add('resize-hover');
      } else {
        card.style.cursor = 'default';
        card.classList.remove('resize-hover');
      }
    });

    card.addEventListener('mouseleave', () => {
      card.style.cursor = 'default';
      card.classList.remove('resize-hover');
    });

    // mousedown for drag
    card.addEventListener('mousedown', e => {
      const rect = card.getBoundingClientRect();
      const nearBottom = (rect.bottom - e.clientY) <= RESIZE_ZONE;
      if (!nearBottom) return;
      e.preventDefault();
      dragging = { idx: i, startY: e.clientY, startH: heights[i] };
      document.body.style.cursor = 'ns-resize';
      document.body.style.userSelect = 'none';
    });

    colP.appendChild(card);
  });
}

function renderTasks() {
  colT.innerHTML = '';
  const groups = getTaskGroups();
  const totalTasks = tasks.length;

  groups.forEach(g => {
    const group = document.createElement('div');
    group.className = 'task-group';
    group.style.setProperty('--c', projects[g.p].color);
    group.style.setProperty('--group-flex', g.tasks.length);

    g.tasks.forEach(t => {
      const row = document.createElement('div');
      row.className = 'task-row';

      const s = statuses[t.s];
      const btn = document.createElement('div');
      btn.className = 'squircle-btn';
      btn.innerHTML = squircleSVG(s.color, s.solid);
      btn.addEventListener('click', e => {
        e.stopPropagation();
        toggleDropdown(t.idx, btn);
      });

      const label = document.createElement('span');
      label.className = 'task-label';
      label.textContent = t.t;

      row.appendChild(btn);
      row.appendChild(label);
      group.appendChild(row);
    });

    colT.appendChild(group);
  });
}

function toggleDropdown(taskIdx, anchor) {
  if (activeDropdownTask === taskIdx) {
    dropdown.classList.remove('show');
    activeDropdownTask = null;
    return;
  }
  activeDropdownTask = taskIdx;
  const rect = anchor.getBoundingClientRect();
  dropdown.style.left = (rect.right + 6) + 'px';
  dropdown.style.top = (rect.top - 4) + 'px';
  dropdown.innerHTML = '';
  statuses.forEach((s, si) => {
    const opt = document.createElement('div');
    opt.className = 'status-option';
    opt.innerHTML = squircleSVG(s.color, s.solid) + `<span>${s.name}</span>`;
    opt.addEventListener('click', e => {
      e.stopPropagation();
      tasks[taskIdx].s = si;
      const btn = colT.querySelectorAll('.squircle-btn')[taskIdx];
      btn.innerHTML = squircleSVG(s.color, s.solid);
      dropdown.classList.remove('show');
      activeDropdownTask = null;
    });
    dropdown.appendChild(opt);
  });
  dropdown.classList.add('show');
}

document.addEventListener('click', () => {
  dropdown.classList.remove('show');
  activeDropdownTask = null;
});

// --- Accordion ---
let expanded = 'projects';

colT.addEventListener('mouseenter', () => {
  if (expanded === 'tasks') return;
  expanded = 'tasks';
  colP.style.flex = '0.08';
  colT.style.flex = '3';
  colP.classList.add('collapsed');
  colT.classList.add('expanded');
});

colP.addEventListener('mouseenter', () => {
  if (expanded === 'projects') return;
  expanded = 'projects';
  colP.style.flex = '3';
  colT.style.flex = '0.12';
  colP.classList.remove('collapsed');
  colT.classList.remove('expanded');
});

// --- Drag to grow ---
let dragging = null;

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const { idx, startY, startH } = dragging;
  const dy = e.clientY - startY;
  heights[idx] = Math.max(MIN_H, startH + dy);
  const card = colP.querySelectorAll('.project-card')[idx];
  card.style.setProperty('--card-h', heights[idx] + 'px');
});

document.addEventListener('mouseup', () => {
  if (dragging) {
    dragging = null;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

renderProjects();
renderTasks();
</script>
</body>
</html>
